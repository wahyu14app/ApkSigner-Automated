name: "Sign APK Automated - Remote Trigger"

on:
  repository_dispatch:
    types: [trigger_signing]

jobs:
  sign-process:
    runs-on: ubuntu-latest
    name: Sign Android Application

    steps:
      # 1. Ambil kode repositori
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java & Android SDK Env
      - name: Set up JDK 17 & Android SDK Env
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Pastikan Build Tools 33.0.0 terinstall
      - name: Install Android Build Tools 33.0.0
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;33.0.0"

      # 4. Buat folder kosong khusus untuk memisahkan APK target
      - name: Download Remote APK
        run: |
          mkdir -p remote_build
          echo "Mengunduh APK dari: ${{ github.event.client_payload.apk_url }}"
          
          # Menggunakan -f (fail) dan -sS (silent show error) agar ketahuan jika URL-nya bermasalah
          curl -f -L "${{ github.event.client_payload.apk_url }}" -o remote_build/remote-app.apk
          
          # Cek apakah file benar-benar ada dan tidak kosong (ukuran > 0 bytes)
          if [ ! -s "remote_build/remote-app.apk" ]; then
            echo "Error: File hasil download kosong atau gagal diunduh!"
            exit 1
          fi

      # 5. Jalankan penandatanganan di folder khusus tersebut
      - name: Sign APK
        id: sign_app
        uses: ./ 
        with:
          # Arahkan ke folder khusus yang HANYA berisi 1 file APK hasil download tadi
          releaseDirectory: remote_build
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 6. Upload hasilnya sebagai Artifact
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Remote-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
