name: "Sign APK Automated - Wahyu14app"

on:
  push:
    branches:
      - main
      - master
    paths:
      - '*.apk'

jobs:
  sign-process:
    runs-on: ubuntu-latest
    name: Sign Android Application

    steps:
      # 1. Ambil kode dari repositori
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java & Android SDK Env (Penting untuk Ubuntu 24.04)
      - name: Set up JDK 17 & Android SDK Env
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Pastikan Build Tools 33.0.0 terinstall sebelum running
      - name: Install Android Build Tools 33.0.0
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;33.0.0"

      # 4. Cari file APK yang diupload
      - name: Find Uploaded APK
        id: find_apk
        run: |
          APK_PATH=$(ls *.apk | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Tidak ada file APK ditemukan!"
            exit 1
          fi
          echo "FOUND_APK=$APK_PATH" >> $GITHUB_ENV
          echo "Ditemukan APK: $APK_PATH"

      # 5. Jalankan logika signing
      - name: Sign APK
        id: sign_app
        uses: ./ 
        with:
          releaseDirectory: .
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 6. Upload hasilnya sebagai Artifact
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Sudah-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
