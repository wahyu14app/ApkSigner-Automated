name: "Sign APK Automated - Wahyu14app"

on:
  push:
    branches:
      - main
      - master
    paths:
      - '*.apk' # Berjalan otomatis begitu mendeteksi ada file APK diupload

jobs:
  sign-process:
    runs-on: ubuntu-latest
    name: Sign Android Application

    steps:
      # 1. Ambil kode dari repositori kamu sendiri
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cari file APK yang diupload ke root repositori
      - name: Find Uploaded APK
        id: find_apk
        run: |
          APK_PATH=$(ls *.apk | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Tidak ada file APK ditemukan di root repositori!"
            exit 1
          fi
          echo "FOUND_APK=$APK_PATH" >> $GITHUB_ENV
          echo "Ditemukan APK: $APK_PATH"

      # 3. Jalankan logika signing menggunakan kode lokal hasil clone
      - name: Sign APK
        id: sign_app
        uses: ./ 
        with:
          releaseDirectory: .
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 4. Upload hasilnya sebagai Artifact agar bisa langsung kamu download
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Sudah-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
