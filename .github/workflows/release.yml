name: "Sign APK Automated - Cross Repository"

on:
  repository_dispatch:
    types: [mulai_tanda_tangan]

jobs:
  sign-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Signer Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 & Android SDK Env
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android Build Tools 33.0.0
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;33.0.0"

      # --- LANGKAH BARU YANG DITAMBAHKAN ---
      # Menunggu workflow di repositori sumber selesai 100% agar Artifact v4 terbuka aksesnya
      - name: Pantau Status Repositori Asal
        env:
          GH_TOKEN: ${{ secrets.TOKEN_AKSES_PRIVAT }}
        run: |
          echo "Menunggu workflow di repositori ${{ github.event.client_payload.repo_name }} selesai sepenuhnya..."
          gh run watch ${{ github.event.client_payload.run_id }} --repo ${{ github.event.client_payload.repo_name }}
          echo "Workflow asal telah selesai. Artifact siap diunduh!"
      # -------------------------------------

      # Memanfaatkan API untuk mendownload langsung berkas dari repo sebelah secara privat
      - name: Ambil APK Mentah Secara Aman
        uses: actions/download-artifact@v4
        with:
          name: apk-mentah-kamu # Harus sama persis dengan nama artifact di repositori build
          github-token: ${{ secrets.TOKEN_AKSES_PRIVAT }}
          repository: ${{ github.event.client_payload.repo_name }}
          run-id: ${{ github.event.client_payload.run_id }}
          path: folder_target

      - name: Eksekusi Sign APK
        id: sign_app
        uses: ./ 
        with:
          releaseDirectory: folder_target
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Hasil Akhir (apk-sign.apk)
        uses: actions/upload-artifact@v4
        with:
          name: APK-Siap-Pakai
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
